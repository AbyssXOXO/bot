services:
  - type: web
    name: zzz-telegram-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --worker-class aiohttp.GunicornWebWorker --workers 1 --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.11
